# GoReleaser configuration for RagCode MCP Server
# See https://goreleaser.com for documentation

version: 2

project_name: rag-code-mcp

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: rag-code-mcp
    main: ./cmd/rag-code-mcp
    binary: rag-code-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.Date={{.Date}}

  - id: index-all
    main: ./cmd/index-all
    binary: index-all
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

  - id: ragcode-installer
    main: ./cmd/install
    binary: ragcode-installer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
      - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - LICENSE
      - README.md
      # PHP bridge — Docker container files + source
      - php-bridge/Dockerfile
      - php-bridge/server.php
      - php-bridge/parse.php
      - php-bridge/src/**/*
      - php-bridge/composer.json
      - php-bridge/composer.lock

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch
  groups:
    - title: 'New Features'
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: 'Bug Fixes'
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: 'Other Changes'
      order: 999

release:
  github:
    owner: lacrosy
    name: rag-code-mcp

  draft: false
  prerelease: auto

  name_template: "{{.ProjectName}} v{{.Version}}"

  header: |
    ## RagCode MCP Server v{{.Version}}

    Semantic code navigation using RAG (Retrieval-Augmented Generation).
    PHP 8.1-8.4 support via nikic/php-parser. Symfony framework detection.

    ### Quick Install (into ./ragcode/ of your project)

    **macOS (Apple Silicon):**
    ```bash
    curl -fsSL https://github.com/lacrosy/rag-code-mcp/releases/latest/download/rag-code-mcp_darwin_arm64.tar.gz | tar xz
    ./ragcode-installer
    ```

    **macOS (Intel):**
    ```bash
    curl -fsSL https://github.com/lacrosy/rag-code-mcp/releases/latest/download/rag-code-mcp_darwin_amd64.tar.gz | tar xz
    ./ragcode-installer
    ```

    **Linux (amd64):**
    ```bash
    curl -fsSL https://github.com/lacrosy/rag-code-mcp/releases/latest/download/rag-code-mcp_linux_amd64.tar.gz | tar xz
    ./ragcode-installer
    ```

    The installer puts everything into `./ragcode/` and configures detected IDEs automatically.

  footer: |
    **Full documentation:** https://github.com/lacrosy/rag-code-mcp
